<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - Nestora</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="navbar">
    <div>Admin Panel</div>
    <div>
        <a href="/user-dashboard.html">User View</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <h2>All Complaints</h2>
    <ul id="complaints"></ul>

    <h2>All Fees</h2>
    <ul id="fees"></ul>

    

</div>

<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

// Block non-admin
if (!token || role !== "ADMIN") {
    alert("Admins only ❌");
    window.location.href = "/login.html";
}

// LOAD DATA
async function loadAdminData() {

    // COMPLAINTS
    const compRes = await fetch("/admin/complaints", {
        headers: { "Authorization": "Bearer " + token }
    });

    const complaints = await compRes.json();

    const compList = document.getElementById("complaints");
    compList.innerHTML = "";

    complaints.forEach(c => {
        compList.innerHTML += `
            <li>👤 ${c.username} → ${c.message} (${c.status})</li>
        `;
    });

    // FEES
    const feeRes = await fetch("/admin/fees", {
        headers: { "Authorization": "Bearer " + token }
    });

    const fees = await feeRes.json();

    const feeList = document.getElementById("fees");
    feeList.innerHTML = "";

    fees.forEach(f => {
        feeList.innerHTML += `
            <li>👤 ${f.username} → ₹${f.amount} (${f.status})</li>
        `;
    });
}

// ADD RANDOM FEE
async function addRandomFee() {

    const users = ["nidhi", "sri"];
    const user = users[Math.floor(Math.random() * users.length)];
    const amount = Math.floor(Math.random() * 5000) + 1000;

    await fetch("/admin/fees", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            username: user,
            amount: amount,
            status: "PENDING"
        })
    });

    alert(`Fee added for ${user} ₹${amount}`);
    loadAdminData();
}

// LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

// AUTO REFRESH
setInterval(loadAdminData, 5000);

window.onload = loadAdminData;

</script>

</body>
</html>
