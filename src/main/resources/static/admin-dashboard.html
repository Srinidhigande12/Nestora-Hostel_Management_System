<!DOCTYPE html>
<html>
<head>
<title>NESTORA Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { display:flex; margin:0; font-family:Segoe UI; }

.sidebar {
    width:230px;
    height:100vh;
    background:#1f2d3d;
    color:white;
    padding:20px;
}
.sidebar h2 { text-align:center; }
.sidebar button {
    width:100%;
    padding:10px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}
.sidebar button:hover { background:#3c8dbc; }

.main { flex:1; padding:20px; background:#f4f6f9; }

.card {
    display:inline-block;
    padding:20px;
    margin:10px;
    border-radius:10px;
    color:white;
}
.blue { background:#007bff; }

table {
    width:100%;
    background:white;
    border-collapse:collapse;
    margin-top:20px;
}
th,td { padding:10px; }
th { background:black; color:white; }

input {
    padding:10px;
    width:250px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>NESTORA</h2>
<button onclick="loadResidents()">Residents</button>
<button onclick="loadFees()">Fees</button>
<button onclick="loadComplaints()">Complaints</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2>Admin Dashboard</h2>

<input id="search" placeholder="Search..." onkeyup="searchResident()">

<div class="card blue">Total Residents: <span id="count"></span></div>

<canvas id="chart" style="max-width:400px;"></canvas>

<table>
<thead>
<tr><th>Name</th><th>Email</th><th>Phone</th></tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

function logout(){
 localStorage.clear();
 window.location="login.html";
}

function loadResidents(){
 fetch("http://localhost:8081/resident/all")
 .then(r=>r.json())
 .then(data=>{
    let tbody=document.querySelector("tbody");
    tbody.innerHTML="";
    count.innerText=data.length;

    data.forEach(r=>{
        tbody.innerHTML+=`<tr>
        <td>${r.name}</td>
        <td>${r.email}</td>
        <td>${r.phone}</td>
        </tr>`;
    });

    new Chart(chart,{
        type:'bar',
        data:{
            labels:["Residents"],
            datasets:[{data:[data.length]}]
        }
    });

 });
}

function searchResident(){
 let val=search.value.toLowerCase();
 document.querySelectorAll("tbody tr").forEach(r=>{
    r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
 });
}

function loadFees(){
 fetch("http://localhost:8081/fees/all")
 .then(r=>r.json())
 .then(data=>{
    let html="<h3>Fees</h3><table><tr><th>Amount</th><th>Status</th></tr>";
    data.forEach(f=>{
        html+=`<tr>
        <td>${f.amount}</td>
        <td>${f.status}</td>
        </tr>`;
    });
    html+="</table>";
    document.querySelector(".main").innerHTML=html;
 });
}

function loadComplaints(){
 fetch("http://localhost:8081/complaint/all")
 .then(r=>r.json())
 .then(data=>{
    let html="<h3>Complaints</h3><table><tr><th>Description</th></tr>";
    data.forEach(c=>{
        html+=`<tr><td>${c.description}</td></tr>`;
    });
    html+="</table>";
    document.querySelector(".main").innerHTML=html;
 });
}

loadResidents();

</script>

</body>
</html>
