<!DOCTYPE html>
<html>
<head>
<title>NESTORA Login</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#1f2d3d,#3c8dbc);
}
.box {
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
}
h1 { color:#1f2d3d; }
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button {
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
#error { color:red; }
</style>
</head>

<body>

<div class="box">
    <h1>NESTORA</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>
function login(){

 fetch("http://localhost:8081/auth/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    email:email.value,
    password:password.value
  })
 })
 .then(res=>res.json())
 .then(data=>{
    if(data.role==="ADMIN"){
        window.location="admin-dashboard.html";
    }else if(data.role==="USER"){
        localStorage.setItem("userId",data.id);
        window.location="user-dashboard.html";
    }else{
        error.innerText="Invalid login";
    }
 })
 .catch(()=>error.innerText="Server error");

}
</script>

</body>
</html>
