<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width:350px;">

    <h3 class="text-center">Signup</h3>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">

    <select id="role" class="form-control mb-2">
        <option>USER</option>
        <option>ADMIN</option>
    </select>

    <button class="btn btn-success w-100" onclick="signup()">Signup</button>

</div>

<script>

function signup() {

    let data = {
        name: name.value,
        email: email.value,
        password: password.value,
        role: role.value
    };

    fetch("http://localhost:8081/auth/signup", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("Signup successful!");
        window.location.href = "login.html";
    });
}

</script>

</body>
</html>
