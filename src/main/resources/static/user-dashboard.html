<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard - Nestora</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="navbar">
    <div>Welcome, <span id="usernameDisplay"></span></div>
    <div>
        <a href="/user-dashboard.html">Home</a>
        <a href="/admin-dashboard.html" id="adminLink">Admin</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <!-- CARDS -->
    <div class="cards">
        <div class="card"><h3>Total Fees</h3><p id="totalFees">0</p></div>
        <div class="card"><h3>Paid</h3><p id="paidFees">0</p></div>
        <div class="card"><h3>Pending</h3><p id="pendingFees">0</p></div>
    </div>

    <!-- FEES -->
    <h2>Your Fees</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th><th>Amount</th><th>Status</th><th>Action</th>
            </tr>
        </thead>
        <tbody id="feesTable"></tbody>
    </table>

    <!-- COMPLAINTS -->
    <h2>Your Complaints</h2>
    <input type="text" id="complaintInput" placeholder="Enter complaint">
    <button onclick="addComplaint()">Submit</button>
    <ul id="complaintList"></ul>

</div>

<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token) {
    alert("Login first ❌");
    window.location.href = "/login.html";
}

// Hide admin link
if (role !== "ADMIN") {
    document.getElementById("adminLink").style.display = "none";
}

// Username
function getUsernameFromToken() {
    const payload = token.split(".")[1];
    return JSON.parse(atob(payload)).sub;
}

document.getElementById("usernameDisplay").innerText = getUsernameFromToken();

// LOAD FEES
async function loadFees() {
    const res = await fetch("/fees", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    let total = 0, paid = 0, pending = 0;
    const table = document.getElementById("feesTable");
    table.innerHTML = "";

    data.forEach(fee => {
        total += fee.amount;

        if (fee.status === "PAID") paid += fee.amount;
        else pending += fee.amount;

        table.innerHTML += `
            <tr>
                <td>${fee.feeId}</td>
                <td>${fee.amount}</td>
                <td>${fee.status}</td>
                <td>
                    ${fee.status === "PENDING"
                        ? `<button onclick="payFee(${fee.feeId})">Pay</button>`
                        : "✔ Paid"}
                </td>
            </tr>
        `;
    });

    document.getElementById("totalFees").innerText = total;
    document.getElementById("paidFees").innerText = paid;
    document.getElementById("pendingFees").innerText = pending;
}

// PAY
async function payFee(id) {
    await fetch(`/fees/pay/${id}`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
    });

    alert("Payment successful ✅");
    loadFees();
}

// LOAD COMPLAINTS
async function loadComplaints() {
    const res = await fetch("/complaints/my", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    const list = document.getElementById("complaintList");
    list.innerHTML = "";

    data.forEach(c => {
        list.innerHTML += `<li>${c.message} - ${c.status}</li>`;
    });
}

// ADD COMPLAINT
async function addComplaint() {
    const message = document.getElementById("complaintInput").value;

    if (!message) {
        alert("Enter complaint ❌");
        return;
    }

    await fetch("/complaints", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ message })
    });

    alert("Complaint submitted ✅");
    document.getElementById("complaintInput").value = "";
    loadComplaints();
}

// LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

window.onload = () => {
    loadFees();
    loadComplaints();
};

</script>

</body>
</html>
