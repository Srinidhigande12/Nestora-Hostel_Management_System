<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>

<style>
body {
    font-family:Segoe UI;
    background:#f4f6f9;
    padding:20px;
}
.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<h2>User Dashboard</h2>

<div class="card">
<h3>Your Fees</h3>
<ul id="fees"></ul>
</div>

<div class="card">
<h3>Your Complaints</h3>
<ul id="complaints"></ul>
</div>

<script>

let userId = localStorage.getItem("userId");

fetch("http://localhost:8081/fees/all")
.then(r=>r.json())
.then(data=>{
    data.forEach(f=>{
        if(f.resident && f.resident.id == userId){
            fees.innerHTML += `<li style="color:${f.status=='PAID'?'green':'red'}">
            ${f.amount} - ${f.status}</li>`;
        }
    });
});

fetch("http://localhost:8081/complaint/all")
.then(r=>r.json())
.then(data=>{
    data.forEach(c=>{
        if(c.resident && c.resident.id == userId){
            complaints.innerHTML += `<li>${c.description}</li>`;
        }
    });
});

</script>

</body>
</html>
