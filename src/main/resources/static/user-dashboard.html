<!DOCTYPE html>
<html>
<head>
    <title>Nestora - Hostel Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
    <div>
        Welcome, <span id="usernameDisplay"></span>
    </div>
    <div>
        <a href="/user-dashboard.html">Home</a>
        <a href="/admin-dashboard.html">Admin</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <h2>Your Fees</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="feesTable"></tbody>
    </table>

</div>

<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token || !role) {
    alert("Please login first ❌");
    window.location.href = "/login.html";
}

if (role !== "USER" && role !== "ADMIN") {
    alert("Access denied ❌");
    window.location.href = "/login.html";
}

// ✅ USERNAME
function getUsernameFromToken() {
    const payload = token.split(".")[1];
    const decoded = JSON.parse(atob(payload));
    return decoded.sub;
}

document.getElementById("usernameDisplay").innerText = getUsernameFromToken();

// ✅ LOAD FEES
async function loadFees() {

    document.getElementById("feesTable").innerHTML =
        "<tr><td colspan='4'>Loading...</td></tr>";

    const response = await fetch("/fees", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!response.ok) {
        alert("Error ❌");
        return;
    }

    const data = await response.json();

    const table = document.getElementById("feesTable");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = "<tr><td colspan='4'>No fees found</td></tr>";
        return;
    }

    data.forEach(fee => {
        table.innerHTML += `
            <tr>
                <td>${fee.feeId}</td>
                <td>${fee.amount}</td>
                <td>${fee.status}</td>
                <td>
                    ${fee.status === "PENDING"
                        ? `<button onclick="payFee(${fee.feeId})">Pay</button>`
                        : "✔ Paid"}
                </td>
            </tr>
        `;
    });
}

// ✅ PAY
async function payFee(id) {
    await fetch(`/fees/pay/${id}`, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token
        }
    });
    loadFees();
}

// ✅ LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

window.onload = loadFees;

</script>

</body>
</html>
