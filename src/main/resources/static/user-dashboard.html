<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="navbar">User Dashboard</div>

<div class="container">

    <button onclick="logout()">Logout</button>

    <h2>Your Fees</h2>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="feesTable"></tbody>
    </table>

</div>

<script>
const token = localStorage.getItem("token");

async function loadFees() {

    const response = await fetch("/fees", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!response.ok) {
        alert("Error: " + response.status);
        return;
    }

    const data = await response.json();

    const table = document.getElementById("feesTable");
    table.innerHTML = "";

    data.forEach(fee => {

        const row = `
            <tr>
                <td>${fee.feeId}</td>
                <td>${fee.amount}</td>
                <td>${fee.status}</td>
                <td>
                    ${fee.status === "PENDING" 
                        ? `<button onclick="payFee(${fee.feeId})">Pay</button>`
                        : "✔ Paid"}
                </td>
            </tr>
        `;

        table.innerHTML += row;
    });
}

async function payFee(id) {

    const response = await fetch(`/fees/pay/${id}`, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (response.ok) {
        alert("Payment successful ✅");
        loadFees();
    } else {
        alert("Payment failed ❌");
    }
}

function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

loadFees();
</script>

</body>
</html>
